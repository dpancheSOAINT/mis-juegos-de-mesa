<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Ludoteca - Mis Juegos de Mesa</title>
  <!-- Tailwind CSS CDN para el diseño visual -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 sm:p-8 font-sans">

  <div class="max-w-6xl mx-auto">
    <!-- Encabezado -->
    <header class="text-center mb-8">
      <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-indigo-400">🎲 Mi Ludoteca</h1>
      <p class="text-slate-400 mt-2">Administra tus juegos de mesa y registra cuándo los jugaste por última vez.</p>
    </header>

    <!-- Formulario para agregar juegos -->
    <div class="bg-slate-800 p-6 rounded-2xl shadow-xl mb-10 border border-slate-700">
      <h2 class="text-xl font-bold mb-4 text-slate-200">➕ Agregar nuevo juego</h2>
      <form id="game-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Nombre del juego</label>
          <input type="text" id="title" required placeholder="Ej. Catan" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">URL de la Portada</label>
          <input type="url" id="image" required placeholder="https://ejemplo.com/imagen.jpg" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Última vez jugado</label>
          <input type="date" id="lastPlayed" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-100 focus:outline-none focus:border-indigo-500">
        </div>
        <div class="md:col-span-3 flex justify-end mt-2">
          <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 px-6 rounded-lg transition duration-200 shadow-md hover:shadow-indigo-500/20">
            Guardar Juego
          </button>
        </div>
      </form>
    </div>

    <!-- Lista de juegos -->
    <main>
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-slate-200">Colección (<span id="game-count">0</span>)</h2>
      </div>

      <!-- Grid donde se renderizan las tarjetas -->
      <div id="games-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- Las tarjetas se insertan dinámicamente con JS -->
      </div>

      <!-- Estado vacío -->
      <div id="empty-state" class="hidden text-center py-16 bg-slate-800/50 rounded-2xl border border-dashed border-slate-700">
        <p class="text-slate-400 text-lg">No tienes juegos registrados aún.</p>
        <p class="text-slate-500 text-sm mt-1">Usa el formulario de arriba para agregar el primero.</p>
      </div>
    </main>
  </div>

  <script>
    // Referencias al DOM
    const gameForm = document.getElementById('game-form');
    const gamesGrid = document.getElementById('games-grid');
    const emptyState = document.getElementById('empty-state');
    const gameCount = document.getElementById('game-count');

    // Cargar juegos guardados en localStorage
    let games = JSON.parse(localStorage.getItem('my_board_games')) || [];

    // Función para renderizar los juegos en pantalla
    function renderGames() {
      gamesGrid.innerHTML = '';
      gameCount.textContent = games.length;

      if (games.length === 0) {
        emptyState.classList.remove('hidden');
      } else {
        emptyState.classList.add('hidden');
        
        games.forEach((game, index) => {
          const card = document.createElement('div');
          card.className = 'bg-slate-800 rounded-xl overflow-hidden shadow-lg border border-slate-700 flex flex-col justify-between hover:border-slate-600 transition duration-200';
          
          card.innerHTML = `
            <div>
              <div class="h-48 overflow-hidden bg-slate-900 relative">
                <img src="${game.image}" alt="${game.title}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1610890716171-6b1bb98ffd09?w=500'">
              </div>
              <div class="p-4">
                <h3 class="text-lg font-bold text-slate-100 truncate">${game.title}</h3>
                <div class="mt-3 flex items-center text-xs text-slate-400 bg-slate-900/60 p-2 rounded-md">
                  <span class="mr-1.5">📅 Jugado:</span>
                  <span class="font-semibold text-indigo-300">${game.lastPlayed}</span>
                </div>
              </div>
            </div>
            <div class="p-4 pt-0">
              <button onclick="deleteGame(${index})" class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-400 font-semibold py-1.5 px-3 rounded-lg text-sm border border-red-500/20 transition duration-150">
                Eliminar
              </button>
            </div>
          `;
          gamesGrid.appendChild(card);
        });
      }
    }

    // Guardar lista en localStorage
    function saveGames() {
      localStorage.setItem('my_board_games', JSON.stringify(games));
      renderGames();
    }

    // Agregar un juego nuevo
    gameForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const newGame = {
        title: document.getElementById('title').value,
        image: document.getElementById('image').value,
        lastPlayed: document.getElementById('lastPlayed').value
      };

      games.unshift(newGame); // Agrega al inicio de la lista
      saveGames();
      gameForm.reset();
    });

    // Eliminar un juego
    function deleteGame(index) {
      if (confirm('¿Seguro que deseas eliminar este juego de tu lista?')) {
        games.splice(index, 1);
        saveGames();
      }
    }

    // Cargar juegos al iniciar la página
    renderGames();
  </script>
</body>
</html>
